apiVersion: v1
kind: ConfigMap
metadata:
  name: vmconf-db-config
  namespace: default
data:
  # 数据库主机配置（指向虚拟机MySQL）
  DB_HOST: "192.168.1.100"  # 请修改为您的MySQL虚拟机IP地址
  DB_PORT: "3306"
  DB_USER: "vmconf_user"
  DB_NAME: "vmconf_db"

  # 数据库连接池配置
  CONNECTION_LIMIT: "10"
  QUEUE_LIMIT: "0"

  # JWT配置
  JWT_SECRET: "vmconf_jwt_secret_key_20260521_please_change_in_production"
  JWT_EXPIRE: "7d"

  # 服务器配置
  PORT: "3000"
  NODE_ENV: "production"

  # 文件上传配置
  UPLOAD_DIR: "uploads"
  MAX_FILE_SIZE: "10485760"

  # 日志配置
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: vmconf-db-secret
  namespace: default
type: Opaque
stringData:
  # 数据库密码（请修改为实际密码）
  DB_PASSWORD: "Db68#$68"
